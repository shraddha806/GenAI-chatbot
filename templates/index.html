
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tcs ChatBot</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f5f5f5 100%);
            margin: 0; padding: 0;
        }
        .chat-container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            padding: 32px 28px 24px 28px;
            position: relative;
        }
        .chat-container::before {
            content: '';
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 80px;
            background: url('https://img.icons8.com/color/96/robot.png') no-repeat center center;
            background-size: contain;
            opacity: 0.15;
            z-index: 0;
        }
        h2 {
            margin-top: 0;
            font-weight: 700;
            color: #3b3b3b;
            letter-spacing: 1px;
        }
        .chat-history {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 24px;
            padding-right: 4px;
        }
        .message {
            margin-bottom: 18px;
            display: flex;
            align-items: flex-end;
        }
        .user {
            justify-content: flex-end;
        }
        .bot {
            justify-content: flex-start;
        }
        .bubble {
            display: inline-block;
            padding: 14px 22px;
            border-radius: 22px;
            max-width: 80%;
            font-size: 1.08em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            position: relative;
        }
        .user .bubble {
            background: linear-gradient(135deg, #0078d4 60%, #4f8cff 100%);
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .bot .bubble {
            background: linear-gradient(135deg, #e5e5ea 60%, #f3f3f7 100%);
            color: #333;
            border-bottom-left-radius: 6px;
        }
        form {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1.5px solid #bfc8e6;
            font-size: 1em;
            background: #f7f9fc;
            transition: border 0.2s;
        }
        input[type="text"]:focus {
            border: 1.5px solid #0078d4;
            outline: none;
        }
        button {
            padding: 12px 28px;
            border-radius: 24px;
            border: none;
            background: linear-gradient(135deg, #0078d4 60%, #4f8cff 100%);
            color: #fff;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: background 0.2s;
        }
        button:hover {
            background: linear-gradient(135deg, #005fa3 60%, #0078d4 100%);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2 style="text-align:center;">TCS ChatBot</h2>
        <div class="chat-history">
            {% if question %}
            <div class="message user">
                <div class="bubble">{{ question }}</div>
            </div>
            {% endif %}
            {% if answer %}
            <div class="message bot">
                <div class="bubble">{{ answer }}</div>
            </div>
            {% endif %}
            <!-- Context removed, only answer will be shown -->
        </div>
        <form method="POST" action="/">
            <input type="text" name="question" placeholder="Type your question here..." required autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
